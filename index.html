<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Carrosserie</title>
<style>
  :root {
    --steel:    #1e2a38;
    --steel-mid:#2c3e52;
    --accent:   #e84c1e;
    --amber:    #f5a623;
    --surface:  #f0f2f5;
    --card:     #ffffff;
    --border:   #d0d6df;
    --text:     #1e2a38;
    --muted:    #6b7a8d;
    --loan-bg:  #e8f4fd;
    --loan-hd:  #1a5276;
    --noloan-bg:#fef9f0;
    --slot-h:   52px;
    --col-label:160px;
    --col-day:  1fr;
    --header-h: 48px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; }

  .topbar { background: var(--steel); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 56px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
  .topbar .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.1rem; letter-spacing: .04em; }
  .topbar .logo span { color: var(--accent); }
  .topbar .week-nav { display: flex; align-items: center; gap: 8px; }
  .topbar .week-nav button { background: var(--steel-mid); border: none; color: #fff; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background .15s; }
  .topbar .week-nav button:hover { background: var(--accent); }
  .week-label { font-size: .9rem; font-weight: 600; min-width: 200px; text-align: center; }
  .topbar .stats { display: flex; gap: 12px; font-size: .82rem; align-items: center; }
  .stat-box { background: var(--steel-mid); border-radius: 8px; padding: 4px 12px; display: flex; flex-direction: column; align-items: center; }
  .stat-box .val { font-size: 1.15rem; font-weight: 700; color: var(--amber); }
  .stat-box .lbl { font-size: .68rem; opacity: .7; }
  .tech-box { background: var(--steel-mid); border-radius: 8px; padding: 4px 12px; display: flex; align-items: center; gap: 10px; }
  .tech-box .tech-btn { background: rgba(255,255,255,.15); border: none; color: #fff; width: 22px; height: 22px; border-radius: 4px; cursor: pointer; font-size: 1rem; line-height: 1; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .tech-box .tech-btn:hover { background: var(--accent); }
  .tech-block { display: flex; flex-direction: column; align-items: center; }
  .tech-block .val { font-size: 1.15rem; font-weight: 700; color: var(--amber); }
  .tech-block .lbl { font-size: .68rem; opacity: .7; }
  .tech-sep { width: 1px; height: 28px; background: rgba(255,255,255,.15); }
  .sync-indicator { font-size: .68rem; padding: 2px 8px; border-radius: 10px; font-weight: 700; letter-spacing: .04em; }
  .sync-ok   { background: rgba(46,204,113,.25); color: #2ecc71; }
  .sync-wait { background: rgba(245,166,35,.25);  color: var(--amber); }
  .sync-err  { background: rgba(231,76,60,.25);   color: #e74c3c; }

  .planner-wrap { padding: 16px; max-width: 1600px; margin: 0 auto; }
  .section-label { display: flex; align-items: center; gap: 10px; margin: 12px 0 6px; font-size: .78rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .grid-container { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .grid-header { display: grid; grid-template-columns: var(--col-label) repeat(5, var(--col-day)); background: var(--steel); height: var(--header-h); position: sticky; top: 56px; z-index: 50; }
  .grid-header .h-corner { display: flex; align-items: center; padding: 0 12px; color: rgba(255,255,255,.5); font-size: .72rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; border-right: 1px solid rgba(255,255,255,.08); }
  .grid-header .h-day { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; border-right: 1px solid rgba(255,255,255,.08); font-size: .82rem; }
  .grid-header .h-day .day-name { font-weight: 700; font-size: .9rem; }
  .grid-header .h-day .day-date { font-size: .72rem; opacity: .6; }
  .grid-header .h-day.today { background: var(--accent); }
  .grid-row { display: grid; grid-template-columns: var(--col-label) repeat(5, var(--col-day)); height: var(--slot-h); border-bottom: 1px solid var(--border); position: relative; }
  .grid-row:last-child { border-bottom: none; }
  .row-label { display: flex; align-items: center; padding: 0 10px; border-right: 2px solid var(--border); gap: 7px; font-size: .83rem; font-weight: 600; white-space: nowrap; overflow: hidden; cursor: default; position: relative; z-index: 2; background: var(--card); }
  .row-label .vehicle-icon { font-size: 1rem; flex-shrink: 0; }
  .row-label .vehicle-name { flex: 1; overflow: hidden; text-overflow: ellipsis; cursor: pointer; border-bottom: 1px dashed transparent; transition: border-color .15s; padding: 2px 4px; border-radius: 3px; }
  .row-label .vehicle-name:hover { border-color: var(--accent); background: rgba(232,76,30,.05); }
  .row-label input.vehicle-edit { flex: 1; border: 1.5px solid var(--accent); border-radius: 4px; padding: 2px 6px; font-size: .83rem; font-weight: 600; font-family: inherit; color: var(--text); outline: none; background: #fff; }
  .loan-badge { font-size: .6rem; background: var(--loan-hd); color: #fff; border-radius: 3px; padding: 1px 5px; font-weight: 700; letter-spacing: .04em; flex-shrink: 0; }
  .grid-row.has-loan .row-label { background: var(--loan-bg); }
  .grid-row.has-loan .day-cell  { background: rgba(26,82,118,.03); }
  .grid-row.no-loan .row-label  { background: var(--noloan-bg); }
  .grid-row.no-loan .day-cell   { background: rgba(125,78,27,.02); }
  .day-cell { border-right: 1px solid var(--border); position: relative; cursor: pointer; transition: background .1s; }
  .day-cell:last-child { border-right: none; }
  .day-cell:hover { background: rgba(232,76,30,.06) !important; }
  .day-cell.today-col { background: rgba(232,76,30,.04) !important; }
  .day-cell.today-col:hover { background: rgba(232,76,30,.1) !important; }
  .day-cell.drag-over { background: rgba(232,76,30,.18) !important; outline: 2px dashed var(--accent); outline-offset: -2px; }

  .appt { position: absolute; top: 4px; bottom: 4px; left: 3px; right: 3px; border-radius: 6px; display: flex; align-items: center; padding: 0 7px; font-size: .76rem; font-weight: 600; gap: 4px; overflow: hidden; white-space: nowrap; cursor: grab; box-shadow: 0 2px 6px rgba(0,0,0,.15); user-select: none; z-index: 10; transition: box-shadow .15s, opacity .15s; }
  .appt:active { cursor: grabbing; }
  .appt.dragging { opacity: .45; box-shadow: none; }
  .appt .appt-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .appt .appt-hours { font-size: .68rem; opacity: .85; background: rgba(255,255,255,.25); border-radius: 4px; padding: 1px 4px; flex-shrink: 0; }
  .appt .appt-actions { display: flex; gap: 3px; opacity: 0; transition: opacity .15s; flex-shrink: 0; }
  .appt:hover .appt-actions { opacity: 1; }
  .appt .btn-action { font-size: .78rem; line-height: 1; padding: 2px 5px; border-radius: 4px; background: rgba(255,255,255,.22); color: #fff; cursor: pointer; border: none; font-family: inherit; transition: background .12s; white-space: nowrap; }
  .appt .btn-action:hover { background: rgba(255,255,255,.42); }
  .badge { font-size: .58rem; font-weight: 800; letter-spacing: .05em; color: #fff; border-radius: 3px; padding: 1px 5px; flex-shrink: 0; }
  .badge-green   { background: #2ecc71; }
  .badge-orange  { background: #e67e22; }
  .badge-blue    { background: #2980b9; }
  .appt.arrived  { outline: 3px solid #2ecc71; outline-offset: -2px; }

  #dragGhost { position: fixed; pointer-events: none; z-index: 999; border-radius: 6px; padding: 4px 10px; font-size: .78rem; font-weight: 700; color: #fff; white-space: nowrap; box-shadow: 0 6px 20px rgba(0,0,0,.3); opacity: .88; transform: translate(-50%,-50%); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 28px 30px; width: 420px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
  .modal h2 { font-size: 1.1rem; font-weight: 700; color: var(--steel); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
  .modal h2::before { content: '🔧'; font-size: 1.2rem; }
  .modal label { display: block; font-size: .78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; margin-top: 14px; }
  .modal input, .modal textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: .88rem; font-family: inherit; color: var(--text); outline: none; transition: border-color .15s; }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal .hours-row { display: flex; gap: 10px; }
  .modal .hours-row > div { flex: 1; }
  .modal .duration-note { font-size: .75rem; color: var(--muted); margin-top: 6px; }
  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .color-swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform .15s, border-color .15s; }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: #1e2a38; }
  .modal .btn-row { display: flex; gap: 10px; margin-top: 22px; }
  .btn-primary { flex: 1; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 10px; font-size: .9rem; font-weight: 700; cursor: pointer; transition: background .15s; }
  .btn-primary:hover { background: #c43f18; }
  .btn-secondary { background: var(--surface); color: var(--muted); border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 18px; font-size: .9rem; cursor: pointer; }
  .btn-secondary:hover { background: var(--border); }
  #editModalOverlay { z-index: 210; }
  .status-row { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .status-btn { flex: 1; min-width: 100px; border: 2px solid var(--border); border-radius: 8px; padding: 8px 6px; font-size: .78rem; font-weight: 700; cursor: pointer; background: var(--surface); color: var(--muted); transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 5px; font-family: inherit; }
  .status-btn.active-arrived  { border-color: #2ecc71; background: #eafaf1; color: #1e8449; }
  .status-btn.active-pending  { border-color: var(--amber); background: #fef9e7; color: #9a6a00; }
  .status-btn.active-ordered  { border-color: #e67e22; background: #fef0e7; color: #a04000; }
  .status-btn.active-delivered{ border-color: #2980b9; background: #e8f4fd; color: #1a5276; }

  /* Section pièce dans la modale */
  .piece-section { background: #f8f9fa; border-radius: 10px; padding: 12px 14px; margin-top: 14px; border: 1px solid var(--border); }
  .piece-section-title { font-size: .78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .piece-fournisseur { margin-top: 10px; }

  .tooltip { position: fixed; background: var(--steel); color: #fff; font-size: .78rem; padding: 6px 12px; border-radius: 6px; pointer-events: none; z-index: 300; white-space: nowrap; opacity: 0; transition: opacity .15s; }
  .tooltip.show { opacity: 1; }
  .loader { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); font-size: .9rem; gap: 10px; }
  .loader::before { content: ''; width: 20px; height: 20px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">🔧 <span>AUTO</span>PLANNING</div>
  <div class="week-nav">
    <button id="btnPrevWeek">‹</button>
    <div class="week-label" id="weekLabel"></div>
    <button id="btnNextWeek">›</button>
    <button id="btnToday" style="width:auto;padding:0 10px;font-size:.78rem;">Auj.</button>
  </div>
  <div class="stats">
    <span class="sync-indicator sync-wait" id="syncStatus">⏳ Connexion…</span>
    <div class="stat-box">
      <div class="val" id="totalHours">0h</div>
      <div class="lbl">Heures saisies</div>
    </div>
    <div class="stat-box">
      <div class="val" id="totalAppts">0</div>
      <div class="lbl">Rendez-vous</div>
    </div>
    <div class="tech-box">
      <div class="tech-block">
        <div class="val" id="totalCapacity">117h</div>
        <div class="lbl">Capacité</div>
      </div>
      <div class="tech-sep"></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
        <div style="display:flex;align-items:center;gap:5px;">
          <button class="tech-btn" id="btnTechMinus">−</button>
          <span class="val" id="techCount">3</span>
          <button class="tech-btn" id="btnTechPlus">+</button>
        </div>
        <div class="lbl">Techniciens</div>
      </div>
      <div class="tech-sep"></div>
      <div class="tech-block">
        <div class="val" id="fillRate" style="color:#2ecc71;">0%</div>
        <div class="lbl">Remplissage</div>
      </div>
    </div>
  </div>
</div>

<div class="planner-wrap"><div id="planner"><div class="loader">Chargement du planning…</div></div></div>

<!-- MODAL NOUVEAU RDV -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Nouveau rendez-vous</h2>
    <label>Client / Véhicule</label>
    <input type="text" id="apptName" placeholder="Ex: DUPONT – Peugeot 308">
    <label>Durée (jours)</label>
    <div class="hours-row">
      <div><input type="number" id="apptDays" value="1" min="1" max="5"></div>
      <div>
        <label style="margin-top:0">Heures de travail</label>
        <input type="number" id="apptHours" value="4" min="0.5" max="999" step="0.5">
      </div>
    </div>
    <div class="duration-note">⏱ Heures saisies manuellement, comptabilisées dans le total.</div>
    <label>Couleur</label>
    <div class="color-picker" id="colorPicker"></div>
    <div class="btn-row">
      <button class="btn-secondary" id="btnCloseModal">Annuler</button>
      <button class="btn-primary" id="btnSaveAppt">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL ÉDITION -->
<div class="modal-overlay" id="editModalOverlay">
  <div class="modal">
    <h2 style="gap:8px;">✏️ Modifier le rendez-vous</h2>
    <label>Client / Véhicule</label>
    <input type="text" id="editApptName">
    <label>Heures de travail</label>
    <input type="number" id="editApptHours" min="0.5" max="999" step="0.5">
    <label>Durée (jours)</label>
    <input type="number" id="editApptDays" min="1" max="5">

    <!-- SECTION PIÈCE -->
    <div class="piece-section">
      <div class="piece-section-title">📦 Pièce</div>
      <div class="status-row">
        <button class="status-btn active-pending" id="btnPieceNon">❌ Non commandée</button>
        <button class="status-btn" id="btnPieceOui">📦 Commandée</button>
        <button class="status-btn" id="btnPieceLivree">✅ Livrée</button>
      </div>
      <div class="piece-fournisseur">
        <label style="margin-top:8px;">Commandée chez</label>
        <input type="text" id="editPieceFournisseur" placeholder="Ex: AD Carrosserie, LKQ, Feu Vert…">
        <label style="margin-top:8px;">Notes / Référence</label>
        <textarea id="editPieceNote" placeholder="Référence, délai, remarques…"></textarea>
      </div>
    </div>

    <label>Statut client</label>
    <div class="status-row">
      <button class="status-btn active-pending" id="btnPending">⏳ En attente</button>
      <button class="status-btn" id="btnArrived">✅ Client arrivé</button>
    </div>

    <label>Couleur</label>
    <div class="color-picker" id="editColorPicker"></div>
    <div class="btn-row">
      <button class="btn-secondary" id="btnCloseEditModal">Annuler</button>
      <button class="btn-primary" id="btnSaveEditAppt">Enregistrer</button>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>
<div id="dragGhost" style="display:none"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA472wEsqwdcO6rf6fRybUA3Zy2vHR0z3I",
  authDomain: "planning-carrosserie-48819.firebaseapp.com",
  projectId: "planning-carrosserie-48819",
  storageBucket: "planning-carrosserie-48819.firebasestorage.app",
  messagingSenderId: "72223690252",
  appId: "1:72223690252:web:1bdb17a61caa960c08a829"
};
const fbApp  = initializeApp(firebaseConfig);
const db     = getFirestore(fbApp);
const docRef = doc(db, "planning", "main");

const COLORS       = ['#2980b9','#27ae60','#8e44ad','#c0392b','#d35400','#16a085','#7f8c8d','#2c3e50'];
const DEFAULT_LOAN   = ['Clio IV','Peugeot 208','C3 Aircross','Toyota Yaris','Polo VI','DS3','Sandero','Mégane IV'];
const DEFAULT_NOLOAN = ['Poste 1','Poste 2','Poste 3','Poste 4','Poste 5','Poste 6','Poste 7','Poste 8'];

let state    = { loanNames:[...DEFAULT_LOAN], noLoanNames:[...DEFAULT_NOLOAN], appointments:[], weekOffset:0 };
let nbTech   = parseInt(localStorage.getItem('carrosserie_tech') || '3');
let isSaving = false;

// ── SYNC ──
function setSyncStatus(s) {
  const el  = document.getElementById('syncStatus');
  const map = { ok:['✅ Synchronisé','sync-ok'], wait:['⏳ Connexion…','sync-wait'], save:['💾 Sauvegarde…','sync-wait'], err:['❌ Hors ligne','sync-err'] };
  el.textContent = map[s][0]; el.className = 'sync-indicator ' + map[s][1];
}
async function saveToFirebase() {
  isSaving = true; setSyncStatus('save');
  try { await setDoc(docRef, { ...state, updatedAt: Date.now() }); setSyncStatus('ok'); }
  catch(e) { console.error(e); setSyncStatus('err'); }
  setTimeout(() => isSaving = false, 600);
}
onSnapshot(docRef, snap => {
  if (isSaving) return;
  if (snap.exists()) { const off=state.weekOffset; state={...snap.data()}; state.weekOffset=off; setSyncStatus('ok'); }
  else { setSyncStatus('ok'); }
  render();
}, err => { console.error(err); setSyncStatus('err'); render(); });

// ── DATES ──
function getMonday(date) { const d=new Date(date),day=d.getDay(); d.setDate(d.getDate()+(day===0?-6:1-day)); d.setHours(0,0,0,0); return d; }
function getWeekDays(offset) { const o=offset!==undefined?offset:state.weekOffset; const m=getMonday(new Date()); m.setDate(m.getDate()+o*7); return Array.from({length:5},(_,i)=>{ const d=new Date(m); d.setDate(d.getDate()+i); return d; }); }
function isToday(d) { return d.toDateString()===new Date().toDateString(); }
function getWeekLabel(days) { const o={day:'numeric',month:'long'},y=days[0].getFullYear(); return `Semaine du ${days[0].toLocaleDateString('fr-FR',o)} au ${days[4].toLocaleDateString('fr-FR',o)} ${y}`; }

// ── TECH ──
function changeTech(delta) { nbTech=Math.max(1,Math.min(20,nbTech+delta)); localStorage.setItem('carrosserie_tech',nbTech); updateTech(); }
function updateTech() {
  const capacity=nbTech*39;
  document.getElementById('techCount').textContent=nbTech;
  document.getElementById('totalCapacity').textContent=capacity+'h';
  const days=getWeekDays(), ws=days[0].toDateString();
  const wa=state.appointments.filter(a=>new Date(a.weekStart).toDateString()===ws);
  const used=wa.reduce((s,a)=>s+(a.hours||0),0);
  const pct=capacity>0?Math.round((used/capacity)*100):0;
  const el=document.getElementById('fillRate');
  el.textContent=pct+'%'; el.style.color=pct>=100?'#e74c3c':pct>=80?'#f5a623':'#2ecc71';
}

// ── RENDER ──
function render() {
  const days=getWeekDays();
  document.getElementById('weekLabel').textContent=getWeekLabel(days);
  updateStats();
  const planner=document.getElementById('planner'); planner.innerHTML='';

  planner.appendChild(mksec('🚗 Véhicules de prêt (8 postes)'));
  const lc=document.createElement('div'); lc.className='grid-container';
  lc.appendChild(buildHeader(days));
  state.loanNames.forEach((n,i)=>lc.appendChild(makeRow('loan',i,n,days)));
  planner.appendChild(lc);

  planner.appendChild(mksec('🔩 Postes sans véhicule de prêt'));
  const nc=document.createElement('div'); nc.className='grid-container';
  nc.appendChild(buildHeader(days));
  state.noLoanNames.forEach((n,i)=>nc.appendChild(makeRow('noloan',i,n,days)));
  planner.appendChild(nc);

  renderAppts(days);
}

function mksec(t) { const e=document.createElement('div'); e.className='section-label'; e.style.margin='14px 0 6px'; e.innerHTML=t; return e; }

function buildHeader(days) {
  const h=document.createElement('div'); h.className='grid-header';
  h.innerHTML=`<div class="h-corner">VÉHICULE</div>`+days.map(d=>`
    <div class="h-day${isToday(d)?' today':''}">
      <span class="day-name">${d.toLocaleDateString('fr-FR',{weekday:'long'}).toUpperCase()}</span>
      <span class="day-date">${d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
    </div>`).join('');
  return h;
}

function makeRow(type,rowIdx,name,days) {
  const row=document.createElement('div');
  row.className=`grid-row ${type==='loan'?'has-loan':'no-loan'}`;
  row.dataset.type=type; row.dataset.row=rowIdx;
  const label=document.createElement('div'); label.className='row-label';
  label.innerHTML=`<span class="vehicle-icon">${type==='loan'?'🚗':'🔧'}</span>`;
  const nameEl=document.createElement('span'); nameEl.className='vehicle-name';
  nameEl.textContent=name; nameEl.title='Cliquer pour modifier';
  nameEl.addEventListener('click',()=>startEditName(nameEl,type,rowIdx));
  label.appendChild(nameEl);
  if(type==='loan'){const b=document.createElement('span');b.className='loan-badge';b.textContent='PRÊT';label.appendChild(b);}
  row.appendChild(label);
  days.forEach((d,dayIdx)=>{
    const cell=document.createElement('div');
    cell.className=`day-cell${isToday(d)?' today-col':''}`;
    cell.dataset.type=type; cell.dataset.row=rowIdx; cell.dataset.day=dayIdx;
    cell.addEventListener('click',()=>openModal(type,rowIdx,dayIdx));
    cell.addEventListener('dragover',e=>{e.preventDefault();cell.classList.add('drag-over');});
    cell.addEventListener('dragleave',()=>cell.classList.remove('drag-over'));
    cell.addEventListener('drop',e=>{e.preventDefault();cell.classList.remove('drag-over');handleDrop(type,rowIdx,dayIdx);});
    row.appendChild(cell);
  });
  return row;
}

function startEditName(el,type,rowIdx) {
  const input=document.createElement('input'); input.className='vehicle-edit'; input.value=el.textContent;
  el.replaceWith(input); input.focus(); input.select();
  const save=()=>{ const v=input.value.trim()||el.textContent; if(type==='loan') state.loanNames[rowIdx]=v; else state.noLoanNames[rowIdx]=v; saveToFirebase(); render(); };
  input.addEventListener('blur',save);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')save();if(e.key==='Escape')render();});
}

// ── BADGE PIÈCE ──
function getPieceBadge(appt) {
  if (appt.pieceStatus === 'delivered') return '<span class="badge badge-blue">✅ LIVRÉ</span>';
  if (appt.pieceStatus === 'ordered')   return '<span class="badge badge-orange">📦 COMMANDÉ</span>';
  return '';
}

function renderAppts(days) {
  const weekStart=days[0].toDateString();
  state.appointments.forEach(appt=>{
    if(new Date(appt.weekStart).toDateString()!==weekStart) return;
    const span=Math.min(appt.span||1,5-appt.day);
    const cell=document.querySelector(`[data-type="${appt.type}"][data-row="${appt.row}"][data-day="${appt.day}"]`);
    if(!cell) return;
    const el=document.createElement('div');
    el.className='appt'; el.style.background=appt.color;
    if(span>1){el.style.right=`calc(-${(span-1)*100}% - ${span-1}px)`;el.style.zIndex=15;}
    if(appt.arrived) el.classList.add('arrived');

    // Tooltip détaillé avec infos pièce
    let tooltipTxt = `${appt.name} — ${appt.hours}h — ${span} jour(s)`;
    if(appt.pieceStatus==='ordered' && appt.pieceFournisseur) tooltipTxt += ` | Commandé chez : ${appt.pieceFournisseur}`;
    if(appt.pieceStatus==='delivered') tooltipTxt += ' | ✅ Pièce livrée';
    if(appt.pieceNote) tooltipTxt += ` | ${appt.pieceNote}`;

    el.innerHTML=`
      <span class="appt-name">${appt.name}</span>
      ${appt.arrived?'<span class="badge badge-green">✔ ARRIVÉ</span>':''}
      ${getPieceBadge(appt)}
      <span class="appt-hours">${appt.hours}h</span>
      <div class="appt-actions">
        <button class="btn-action btn-copy" title="Copier semaine suivante">📋+1</button>
        <button class="btn-action btn-del" title="Supprimer">✕</button>
      </div>
    `;
    el.querySelector('.btn-copy').addEventListener('click',e=>{e.stopPropagation();copyToNextWeek(appt);});
    el.querySelector('.btn-del').addEventListener('click',e=>{e.stopPropagation();deleteAppt(appt.id);});
    el.addEventListener('click',e=>{if(e.target.closest('.appt-actions'))return;openEditModal(appt.id);});
    el.addEventListener('mouseenter',e=>showTooltip(e,tooltipTxt));
    el.addEventListener('mouseleave',hideTooltip);
    el.addEventListener('mousemove',e=>moveTooltip(e));
    el.setAttribute('draggable','true');
    el.addEventListener('dragstart',e=>{
      if(e.target.closest('.appt-actions')){e.preventDefault();return;}
      dragApptId=appt.id; el.classList.add('dragging');
      const ghost=document.getElementById('dragGhost');
      ghost.style.display='block'; ghost.style.background=appt.color; ghost.textContent=appt.name;
      e.dataTransfer.setDragImage(ghost,-999,-999);
    });
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');document.getElementById('dragGhost').style.display='none';dragApptId=null;});
    cell.appendChild(el);
  });
}

// ── DRAG ──
let dragApptId=null;
document.addEventListener('dragover',e=>{const g=document.getElementById('dragGhost');if(g.style.display==='block'){g.style.left=e.clientX+'px';g.style.top=(e.clientY-20)+'px';}});
function handleDrop(type,row,day){
  if(!dragApptId)return;
  const appt=state.appointments.find(a=>a.id===dragApptId);if(!appt)return;
  const days=getWeekDays();
  appt.type=type;appt.row=row;appt.day=day;appt.span=Math.min(appt.span||1,5-day);appt.weekStart=days[0].toISOString();
  saveToFirebase();render();
}

// ── COPIER ──
function copyToNextWeek(appt){
  const apptMon=getMonday(new Date(appt.weekStart));
  const nowMon=getMonday(new Date());
  const nextOffset=Math.round((apptMon-nowMon)/(7*86400000))+1;
  const nextDays=getWeekDays(nextOffset);
  state.appointments.push({
    id:Date.now().toString(36)+Math.random().toString(36).slice(2),
    type:appt.type,row:appt.row,day:appt.day,span:appt.span,
    name:appt.name,hours:appt.hours,color:appt.color,
    arrived:false,
    pieceStatus:appt.pieceStatus||'none',
    pieceFournisseur:appt.pieceFournisseur||'',
    pieceNote:appt.pieceNote||'',
    weekStart:nextDays[0].toISOString()
  });
  state.weekOffset=nextOffset;
  saveToFirebase();render();
}

// ── MODAL NOUVEAU ──
let pendingAppt=null,selectedColor=0;
function openModal(type,row,day){
  pendingAppt={type,row,day};selectedColor=0;
  document.getElementById('apptName').value='';
  document.getElementById('apptDays').value=1;
  document.getElementById('apptHours').value=4;
  buildColorPicker('colorPicker',i=>selectedColor=i);
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('apptName').focus(),50);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');pendingAppt=null;}
function saveAppt(){
  if(!pendingAppt)return;
  const name=document.getElementById('apptName').value.trim();
  const days=parseInt(document.getElementById('apptDays').value)||1;
  const hours=parseFloat(document.getElementById('apptHours').value)||0;
  if(!name){document.getElementById('apptName').focus();return;}
  const weekDays=getWeekDays();
  state.appointments.push({
    id:Date.now().toString(36)+Math.random().toString(36).slice(2),
    type:pendingAppt.type,row:pendingAppt.row,day:pendingAppt.day,
    span:Math.min(days,5-pendingAppt.day),name,hours,
    color:COLORS[selectedColor],weekStart:weekDays[0].toISOString(),
    arrived:false,pieceStatus:'none',pieceFournisseur:'',pieceNote:''
  });
  saveToFirebase();closeModal();render();
}
function deleteAppt(id){state.appointments=state.appointments.filter(a=>a.id!==id);saveToFirebase();render();}

function buildColorPicker(elId,onPick){
  const cp=document.getElementById(elId);cp.innerHTML='';
  COLORS.forEach((c,i)=>{
    const sw=document.createElement('div');sw.className=`color-swatch${i===0?' selected':''}`;sw.style.background=c;
    sw.addEventListener('click',()=>{cp.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));sw.classList.add('selected');onPick(i);});
    cp.appendChild(sw);
  });
}

// ── STATS ──
function updateStats(){
  const days=getWeekDays(),ws=days[0].toDateString();
  const wa=state.appointments.filter(a=>new Date(a.weekStart).toDateString()===ws);
  document.getElementById('totalHours').textContent=wa.reduce((s,a)=>s+(a.hours||0),0)+'h';
  document.getElementById('totalAppts').textContent=wa.length;
  updateTech();
}
function changeWeek(d){state.weekOffset+=d;render();}
function goToday(){state.weekOffset=0;render();}

// ── TOOLTIP ──
function showTooltip(e,t){const el=document.getElementById('tooltip');el.textContent=t;el.classList.add('show');moveTooltip(e);}
function moveTooltip(e){const el=document.getElementById('tooltip');el.style.left=(e.clientX+12)+'px';el.style.top=(e.clientY-32)+'px';}
function hideTooltip(){document.getElementById('tooltip').classList.remove('show');}

// ── EDIT MODAL ──
let editingApptId=null,editSelectedColor=0,editStatus='pending',editPieceStatus='none';

function openEditModal(id){
  const appt=state.appointments.find(a=>a.id===id);if(!appt)return;
  editingApptId=id;
  editStatus=appt.arrived?'arrived':'pending';
  editPieceStatus=appt.pieceStatus||'none';
  editSelectedColor=Math.max(0,COLORS.indexOf(appt.color));
  document.getElementById('editApptName').value=appt.name;
  document.getElementById('editApptHours').value=appt.hours;
  document.getElementById('editApptDays').value=appt.span||1;
  document.getElementById('editPieceFournisseur').value=appt.pieceFournisseur||'';
  document.getElementById('editPieceNote').value=appt.pieceNote||'';
  setEditStatus(editStatus);
  setEditPieceStatus(editPieceStatus);
  buildColorPicker('editColorPicker',i=>editSelectedColor=i);
  document.querySelectorAll('#editColorPicker .color-swatch').forEach((s,i)=>s.classList.toggle('selected',i===editSelectedColor));
  document.getElementById('editModalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('editApptName').focus(),50);
}

function setEditStatus(s){
  editStatus=s;
  document.getElementById('btnPending').className='status-btn'+(s==='pending'?' active-pending':'');
  document.getElementById('btnArrived').className='status-btn'+(s==='arrived'?' active-arrived':'');
}

function setEditPieceStatus(s){
  editPieceStatus=s;
  document.getElementById('btnPieceNon').className   ='status-btn'+(s==='none'     ?' active-pending':'');
  document.getElementById('btnPieceOui').className   ='status-btn'+(s==='ordered'  ?' active-ordered':'');
  document.getElementById('btnPieceLivree').className='status-btn'+(s==='delivered'?' active-delivered':'');
  // Affiche/masque le champ fournisseur selon statut
  document.querySelector('.piece-fournisseur').style.display=(s==='none'?'none':'block');
}

function closeEditModal(){document.getElementById('editModalOverlay').classList.remove('open');editingApptId=null;}

function saveEditAppt(){
  if(!editingApptId)return;
  const name=document.getElementById('editApptName').value.trim();
  const hours=parseFloat(document.getElementById('editApptHours').value)||0;
  const days=parseInt(document.getElementById('editApptDays').value)||1;
  if(!name){document.getElementById('editApptName').focus();return;}
  const appt=state.appointments.find(a=>a.id===editingApptId);if(!appt)return;
  appt.name=name; appt.hours=hours; appt.color=COLORS[editSelectedColor];
  appt.arrived=(editStatus==='arrived');
  appt.pieceStatus=editPieceStatus;
  appt.pieceFournisseur=document.getElementById('editPieceFournisseur').value.trim();
  appt.pieceNote=document.getElementById('editPieceNote').value.trim();
  appt.span=Math.min(days,5-appt.day);
  saveToFirebase();closeEditModal();render();
}

// ── EVENTS ──
document.getElementById('btnPrevWeek').addEventListener('click',()=>changeWeek(-1));
document.getElementById('btnNextWeek').addEventListener('click',()=>changeWeek(1));
document.getElementById('btnToday').addEventListener('click',()=>goToday());
document.getElementById('btnTechMinus').addEventListener('click',()=>changeTech(-1));
document.getElementById('btnTechPlus').addEventListener('click',()=>changeTech(1));
document.getElementById('btnCloseModal').addEventListener('click',()=>closeModal());
document.getElementById('btnSaveAppt').addEventListener('click',()=>saveAppt());
document.getElementById('btnCloseEditModal').addEventListener('click',()=>closeEditModal());
document.getElementById('btnSaveEditAppt').addEventListener('click',()=>saveEditAppt());
document.getElementById('btnPieceNon').addEventListener('click',()=>setEditPieceStatus('none'));
document.getElementById('btnPieceOui').addEventListener('click',()=>setEditPieceStatus('ordered'));
document.getElementById('btnPieceLivree').addEventListener('click',()=>setEditPieceStatus('delivered'));
document.getElementById('btnPending').addEventListener('click',()=>setEditStatus('pending'));
document.getElementById('btnArrived').addEventListener('click',()=>setEditStatus('arrived'));
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('editModalOverlay').addEventListener('click',function(e){if(e.target===this)closeEditModal();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeEditModal();}
  if(e.key==='Enter'&&document.getElementById('modalOverlay').classList.contains('open'))saveAppt();
});

buildColorPicker('colorPicker',i=>selectedColor=i);
updateTech();
</script>
</body>
</html>
